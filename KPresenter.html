<!DOCTYPE html>
<html lang="en" data-app="kpresenter">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Presenter Roulette – Klass</title>
    <meta name="theme-color" content="#4f46e5">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" href="icons/favicon-64.png">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="stylesheet" href="assets/fonts/inter.css">
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="assets/klass.css">
    <link rel="stylesheet" href="assets/accents.css">
    <script src="assets/tailwind.js"></script>
    <script src="assets/theme.js"></script>
    <script src="assets/klass-util.js"></script>
    <style>
        .roulette {
            position: relative;
            background-color: var(--surface-2);
            border: 1px solid var(--border);
        }
        .roulette.spinning {
            animation: pulse 0.7s infinite;
            filter: blur(1.5px) brightness(1.05);
        }
        .roulette.final {
            background-color: var(--accent-soft);
            border-color: var(--accent-border);
            animation: pop .32s cubic-bezier(.6,0,0,1.4);
            filter: none;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 5px var(--ring); }
            100% { box-shadow: 0 0 20px var(--ring); }
        }
        @keyframes pop {
            0% { transform: scale(0.82);}
            80% { transform: scale(1.08);}
            100% { transform: scale(1);}
        }
        .progress-bar {
            background: linear-gradient(90deg, var(--accent) var(--prog, 60%), transparent 0%);
        }
        .pick-chip {
            background-color: var(--surface-2);
            border: 1px solid var(--border-strong);
            color: var(--text-muted);
            transition: all 0.2s cubic-bezier(.4,0,.2,1);
        }
        .pick-chip:hover {
            color: var(--text);
            border-color: var(--accent-border);
        }
        .pick-chip.selected {
            background-color: var(--accent);
            border-color: var(--accent);
            color: #ffffff;
        }
        .pick-chip.unavailable {
            opacity: 0.45;
            cursor: not-allowed;
            text-decoration: line-through;
        }
        .pick-chip.unavailable:hover {
            color: var(--text-muted);
            border-color: var(--border-strong);
        }
        #historyTable thead th {
            background-color: var(--surface);
            color: var(--text-muted);
        }
        #historyTable tbody tr {
            border-bottom: 1px solid var(--border);
        }
        #historyTable tbody tr:hover {
            background-color: var(--surface-2);
        }
        .toast {
            animation: toast-in .3s cubic-bezier(.4,0,.2,1);
            background-color: #dc2626;
            color: #ffffff;
        }
        @keyframes toast-in {
            from { opacity: 0; transform: translateX(-50%) translateY(-10px);}
            to { opacity: 1; transform: translateX(-50%) translateY(0);}
        }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col">
    <nav class="k-nav">
        <div class="container mx-auto max-w-6xl px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="index.html" class="flex items-center gap-3">
                    <div class="k-logo"><i class="fa-solid fa-graduation-cap"></i></div>
                    <span class="text-lg font-bold">Klass</span>
                </a>
                <span class="k-badge">Presenter Roulette</span>
            </div>
            <button id="themeToggle" class="k-btn k-btn-secondary k-btn-icon" aria-label="Toggle dark mode" title="Toggle dark mode">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </nav>

    <header class="container mx-auto max-w-6xl px-6 pt-10 pb-8 text-center">
        <h1 class="text-3xl md:text-4xl font-bold mb-2">Presenter Roulette</h1>
        <p class="k-status text-base max-w-xl mx-auto">Randomly pick a team, then a member. Perfect for groups, activities, and fair rotation.</p>
    </header>

    <div class="container mx-auto max-w-6xl px-6 pb-8">
        <div class="max-w-md mx-auto">
            <div class="k-card p-6">
                <label class="k-label block mb-3">
                    <i class="fa-solid fa-file-csv mr-2 t-accent"></i>Load team CSV/TSV
                </label>
                <div class="flex flex-col gap-3">
                    <input type="file" id="fileInput" accept=".csv,.tsv" class="k-file block w-full text-sm t-muted"/>
                    <textarea id="csvPaste" rows="3" placeholder="Paste CSV/TSV here (team,member)" class="k-input w-full resize-none"></textarea>
                    <div class="flex gap-2">
                        <button type="button" id="loadPasteBtn" class="k-btn k-btn-primary flex-1">
                            <i class="fa-solid fa-paste"></i>Load Pasted
                        </button>
                        <button type="button" id="useSampleBtn" class="k-btn k-btn-secondary">
                            <i class="fa-solid fa-flask"></i>Sample
                        </button>
                    </div>
                </div>
                <div id="loadStatus" class="k-status mt-3" role="status"></div>
            </div>
        </div>
    </div>

    <main class="flex-1 container mx-auto max-w-6xl px-6 pb-16">
        <div class="grid gap-6 lg:grid-cols-3">

            <div class="k-card p-6">
                <h2 class="k-card-title mb-4"><i class="fa-solid fa-users"></i>Teams</h2>
                <div id="teamRoulette" class="roulette rounded-xl h-20 flex items-center justify-center text-2xl font-bold mb-4 overflow-hidden">
                    <span id="teamRouletteText" class="t-faint">Load data to begin</span>
                    <div id="teamProgress" class="progress-bar absolute left-0 top-0 h-1 w-full rounded-full" style="display:none;"></div>
                </div>
                <div id="teamsList" class="flex flex-wrap gap-2 mb-4 min-h-[48px]"></div>
                <button id="spinTeamBtn" class="k-btn k-btn-primary w-full">
                    <i class="fa-solid fa-rotate"></i>Spin Team
                </button>
            </div>

            <div class="k-card p-6">
                <h2 class="k-card-title mb-4"><i class="fa-solid fa-user"></i>Members</h2>
                <div id="memberRoulette" class="roulette rounded-xl h-20 flex items-center justify-center text-2xl font-bold mb-4 overflow-hidden">
                    <span id="memberRouletteText" class="t-faint">Pick a team above</span>
                    <div id="memberProgress" class="progress-bar absolute left-0 top-0 h-1 w-full rounded-full" style="display:none;"></div>
                </div>
                <div id="membersList" class="flex flex-wrap gap-2 mb-4 min-h-[48px]"></div>
                <div class="flex gap-2 mb-4">
                    <button id="spinMemberBtn" class="k-btn k-btn-primary flex-1">
                        <i class="fa-solid fa-rotate"></i>Spin Member
                    </button>
                    <button id="resetBtn" class="k-btn k-btn-danger k-btn-icon" aria-label="Reset picks" title="Reset picks">
                        <i class="fa-solid fa-arrow-rotate-left"></i>
                    </button>
                </div>
                <div class="space-y-3 pt-4" style="border-top: 1px solid var(--border);">
                    <div class="flex items-center justify-between">
                        <label class="k-label">Team spin duration</label>
                        <div class="flex items-center gap-2">
                            <input type="range" min="1" max="8" id="teamDuration" value="3" class="k-range w-16"/>
                            <input type="number" min="1" max="8" id="teamDurationN" value="3" class="k-input w-12 text-center" style="padding: 0.25rem 0.375rem;"/>
                            <span class="k-label">s</span>
                        </div>
                    </div>
                    <div class="flex items-center justify-between">
                        <label class="k-label">Member spin duration</label>
                        <div class="flex items-center gap-2">
                            <input type="range" min="1" max="8" id="memberDuration" value="3" class="k-range w-16"/>
                            <input type="number" min="1" max="8" id="memberDurationN" value="3" class="k-input w-12 text-center" style="padding: 0.25rem 0.375rem;"/>
                            <span class="k-label">s</span>
                        </div>
                    </div>
                    <label class="flex items-center gap-2 k-label cursor-pointer">
                        <input type="checkbox" id="avoidRepeatTeam" checked class="k-check"/>
                        No repeat team
                    </label>
                    <label class="flex items-center gap-2 k-label cursor-pointer">
                        <input type="checkbox" id="avoidRepeatMember" checked class="k-check"/>
                        No repeat member (in team)
                    </label>
                </div>
            </div>

            <div class="k-card p-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="k-card-title"><i class="fa-solid fa-clock-rotate-left"></i>History</h2>
                    <button id="exportBtn" class="k-btn k-btn-secondary" style="padding: 0.375rem 0.75rem; font-size: 0.8125rem;">
                        <i class="fa-solid fa-download"></i>Export
                    </button>
                </div>
                <div class="overflow-x-auto max-h-80 overflow-y-auto">
                    <table class="w-full text-sm" id="historyTable">
                        <thead class="sticky top-0">
                            <tr>
                                <th class="text-left py-2 px-2 font-medium">#</th>
                                <th class="text-left py-2 px-2 font-medium">Time</th>
                                <th class="text-left py-2 px-2 font-medium">Team</th>
                                <th class="text-left py-2 px-2 font-medium">Member</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer class="k-footer">
        <div class="container mx-auto max-w-6xl px-6 py-6 text-center">
            <span>&copy; 2025 <a href="https://github.com/prasertcbs" target="_blank" rel="noopener" class="t-accent hover:underline">Prasert Kanawattanachai</a> &middot; <a href="index.html" class="t-accent hover:underline">All tools</a></span>
        </div>
    </footer>
    <div class="toast hidden fixed top-6 left-1/2 -translate-x-1/2 px-6 py-3 rounded-xl font-medium shadow-lg z-50" id="toast" role="alert"></div>

<script>
const SAMPLE_CSV = `team,member
coffee,espresso
coffee,americano
coffee,cappuccino
coffee,latte
coffee,mocha
tea,earl grey
tea,jasmine
tea,matcha
tea,yuzu
tea,oolong
tea,thai iced tea
soda,cola
soda,lemon soda
soda,orange soda
bakery,croissant
bakery,muffin
bakery,banana bread`;

function showToast(msg, ms=2500) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.remove('hidden');
  setTimeout(()=>{ toast.classList.add('hidden'); }, ms);
}
function uniqId() { return Math.random().toString(36).slice(2,9) + Date.now().toString(32); }
function nowStr() {
  const d = new Date();
  return d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'})+' '+d.toLocaleDateString();
}

let data = {
  teams: [],
  members: {},
};
let state = {
  selectedTeamId: null,
  selectedMemberId: null,
  teamRollDuration: 3,
  memberRollDuration: 3,
  avoidRepeatTeam: false,
  avoidRepeatMember: false,
  lastTeamId: null,
  lastMemberId: {},
  drawHistory: [],
  maxHistory: 30,
  usedMemberIds: new Set(),
  usedTeamIds: new Set(),
};

function parseCsv(text) {
  const firstLine = text.trim().split('\n')[0];
  const hasTabs = firstLine.includes('\t');
  const separator = hasTabs ? '\t' : ',';
  let rows = text.trim().replace(/\r/g,'').split('\n').map(x=>x.split(separator));
  let headersRaw = rows[0].map(x => x.trim().toLowerCase());
  if ((headersRaw.indexOf("team") === -1 && headersRaw.indexOf("member") === -1) || rows.length === 1) {
    if (rows[0].length === 1) rows.unshift(["team"]);
    else if (rows[0].length === 2) rows.unshift(["team", "member"]);
    headersRaw = rows[0].map(x => x.trim().toLowerCase());
  }
  let tIdx = headersRaw.indexOf('team');
  let mIdx = headersRaw.indexOf('member');
  if (tIdx !== -1 && mIdx === -1) {
    headersRaw.push('member');
    mIdx = headersRaw.length - 1;
    for (let i = 1; i < rows.length; ++i) rows[i][mIdx] = rows[i][tIdx];
  }
  if (tIdx === -1 || mIdx === -1) return null;
  let teams = [], teamsByName = {}, members = {};
  for(let i=1; i<rows.length; ++i){
    let t = rows[i][tIdx] ? rows[i][tIdx].trim() : '';
    let m = rows[i][mIdx] ? rows[i][mIdx].trim() : '';
    if(!t || !m) continue;
    if(!teamsByName[t]){ teamsByName[t] = {id:uniqId(), name:t, members:[]}; teams.push(teamsByName[t]);}
    let mem = {id:uniqId(), name:m, teamId:teamsByName[t].id};
    teamsByName[t].members.push(mem);
    members[mem.id] = mem;
  }
  return {teams, members};
}

function loadData(newData){
  data = newData;
  state.selectedTeamId = null;
  state.selectedMemberId = null;
  state.drawHistory = [];
  state.lastTeamId = null;
  state.lastMemberId = {};
  state.usedMemberIds = new Set();
  state.usedTeamIds = new Set();
  document.getElementById('loadStatus').innerHTML = `<i class="fa-solid fa-check-circle t-accent mr-1"></i>Loaded ${data.teams.length} teams, ${Object.keys(data.members).length} members`;
  renderTeams();
  renderMembers();
  renderHistory();
  renderRoulette(null, 'team');
  renderRoulette(null, 'member');
}

window.addEventListener('DOMContentLoaded', ()=>{
  document.getElementById('csvPaste').value = SAMPLE_CSV;
  document.getElementById('fileInput').addEventListener('change', (e)=>{
    if(e.target.files.length>0){
      let reader = new FileReader();
      reader.onload = evt => {
        let parsed = parseCsv(evt.target.result);
        if(parsed) loadData(parsed);
        else showToast('File format error: need team/member columns');
      };
      reader.readAsText(e.target.files[0], 'utf-8');
    }
  });
  document.getElementById('useSampleBtn').onclick = ()=> loadData(parseCsv(SAMPLE_CSV));
  document.getElementById('loadPasteBtn').onclick = ()=>{
    let txt = document.getElementById('csvPaste').value;
    let parsed = parseCsv(txt);
    if(parsed) loadData(parsed);
    else showToast('Paste error: input must have team column');
  };
  ['teamDuration','teamDurationN','memberDuration','memberDurationN'].forEach(id=>{
    document.getElementById(id).addEventListener('input', (e)=>{
      let v = Math.max(1, Math.min(8, Number(e.target.value)));
      state[id.includes('team')?'teamRollDuration':'memberRollDuration'] = v;
      document.getElementById(id.includes('team')?'teamDuration':'memberDuration').value = v;
      document.getElementById(id.includes('team')?'teamDurationN':'memberDurationN').value = v;
      saveSettings();
    });
  });
  document.getElementById('avoidRepeatTeam').onchange = (e)=>{state.avoidRepeatTeam = e.target.checked; saveSettings();};
  document.getElementById('avoidRepeatMember').onchange = (e)=>{state.avoidRepeatMember = e.target.checked; saveSettings();};
  document.getElementById('spinTeamBtn').onclick = ()=>spinRoulette('team');
  document.getElementById('spinMemberBtn').onclick = ()=>spinRoulette('member');
  document.getElementById('resetBtn').onclick = ()=>{
    state.selectedTeamId = state.selectedMemberId = null;
    state.usedMemberIds = new Set();
    state.usedTeamIds = new Set();
    renderTeams(); renderMembers(); renderRoulette(null,'team'); renderRoulette(null,'member');
  };
  document.getElementById('exportBtn').onclick = exportHistory;
  restoreSettings();
  loadData(parseCsv(SAMPLE_CSV));
});

function saveSettings(){
  localStorage.setItem('teamPickerSettings', JSON.stringify({
    teamRollDuration: state.teamRollDuration,
    memberRollDuration: state.memberRollDuration,
    avoidRepeatTeam: state.avoidRepeatTeam,
    avoidRepeatMember: state.avoidRepeatMember
  }));
}
function restoreSettings(){
  try {
    let s = JSON.parse(localStorage.getItem('teamPickerSettings')) || {};
    if(s.teamRollDuration) state.teamRollDuration = Number(s.teamRollDuration);
    if(s.memberRollDuration) state.memberRollDuration = Number(s.memberRollDuration);
    state.avoidRepeatTeam = !!s.avoidRepeatTeam;
    state.avoidRepeatMember = !!s.avoidRepeatMember;
    document.getElementById('teamDuration').value = state.teamRollDuration;
    document.getElementById('teamDurationN').value = state.teamRollDuration;
    document.getElementById('memberDuration').value = state.memberRollDuration;
    document.getElementById('memberDurationN').value = state.memberRollDuration;
    document.getElementById('avoidRepeatTeam').checked = !!state.avoidRepeatTeam;
    document.getElementById('avoidRepeatMember').checked = !!state.avoidRepeatMember;
  } catch { }
}

function renderTeams(){
  let L = document.getElementById('teamsList');
  L.innerHTML = '';
  data.teams.forEach(team=>{
    let unavailable = state.usedTeamIds.has(team.id);
    let d = document.createElement('div');
    d.tabIndex = unavailable ? -1 : 0;
    d.className = `pick-chip px-3 py-1.5 rounded-lg text-sm font-medium cursor-pointer outline-none ${
      team.id===state.selectedTeamId ? 'selected' : unavailable ? 'unavailable' : ''
    }`;
    d.textContent = team.name+` (${team.members.length})`;
    if(!unavailable) {
      d.onclick = ()=>{ state.selectedTeamId=team.id; state.selectedMemberId=null; renderTeams(); renderMembers(); renderRoulette(team.name, 'team'); renderRoulette(null,'member');};
      d.onkeyup = function(e){if(e.key==='Enter'){d.onclick();}};
    }
    L.appendChild(d);
  });
}

function renderMembers(){
  let M = document.getElementById('membersList');
  M.innerHTML = '';
  let team = data.teams.find(t=>t.id===state.selectedTeamId);
  if(!team){ M.innerHTML = '<span class="t-faint text-sm">Pick a team to view members</span>'; return;}
  team.members.forEach(mem=>{
    let unavailable = state.usedMemberIds.has(mem.id);
    let d = document.createElement('div');
    d.tabIndex = unavailable ? -1 : 0;
    d.className = `pick-chip px-3 py-1.5 rounded-lg text-sm font-medium cursor-pointer outline-none ${
      mem.id===state.selectedMemberId ? 'selected' : unavailable ? 'unavailable' : ''
    }`;
    d.textContent = mem.name;
    if(!unavailable) {
      d.onclick = ()=>{
        state.selectedMemberId = mem.id;
        state.usedMemberIds.add(mem.id);
        state.usedTeamIds.add(team.id);
        appendHistory(team.name, mem.name, mem.id, team.id);
        confetti();
        renderMembers();
        renderTeams();
        renderRoulette(mem.name, 'member');
      };
      d.onkeyup = function(e){if(e.key==='Enter'){d.onclick();}};
    }
    M.appendChild(d);
  });
}

function renderRoulette(val, which, progress=1, spinning=false){
  let txt = document.getElementById(which==='team'?'teamRouletteText':'memberRouletteText');
  let box = document.getElementById(which==='team'?'teamRoulette':'memberRoulette');
  let progElm = document.getElementById(which==='team'?'teamProgress':'memberProgress');
  if(spinning){
    box.classList.add('spinning');
    box.classList.remove('final');
    progElm.style.setProperty('--prog', Math.round(progress*100)+'%');
    progElm.style.display = '';
    txt.textContent = val;
    txt.className = 't-accent';
  } else if(val){
    box.classList.remove('spinning');
    box.classList.add('final');
    txt.textContent = val;
    txt.className = 't-accent';
    progElm.style.display = 'none';
  } else {
    box.classList.remove('spinning', 'final');
    progElm.style.display = 'none';
    txt.textContent = which==='team' ? (data.teams.length?'Pick a team or Spin!':'Load data to begin') : (state.selectedTeamId?'Pick member or Spin!':'Pick a team above');
    txt.className = 't-faint';
  }
}

function spinRoulette(mode){
  if(!data.teams.length){ showToast('Load a valid CSV first'); return;}
  if(mode==='team'){
    let validTeams = data.teams.filter(t=>!state.usedTeamIds.has(t.id));
    if(state.avoidRepeatTeam && validTeams.length>1) validTeams = validTeams.filter(t=>t.id!==state.selectedTeamId);
    if(!validTeams.length) { showToast('No teams left to pick'); return;}
    let i = Math.floor(Math.random()*validTeams.length);
    let target = validTeams[i];
    let rollMs = state.teamRollDuration*1000, steps=rollMs/55, idx=0;
    state.selectedTeamId = null;
    let spinInterval = setInterval(()=>{
      let fakeIdx = Math.floor(Math.random()*validTeams.length);
      let fakeTeam = validTeams[fakeIdx];
      renderRoulette(fakeTeam ? fakeTeam.name : "", 'team', (idx+1)/steps, true);
      idx++;
      if(idx>=steps){
        clearInterval(spinInterval);
        state.selectedTeamId = target.id;
        renderRoulette(target.name, 'team', 1, false);
        renderTeams(); renderMembers();
      }
    },55);
  } else if (mode==='member'){
    let team = data.teams.find(t=>t.id===state.selectedTeamId);
    if(!team){ showToast('Pick a team first');return;}
    let validMembers = team.members.filter(m=>!state.usedMemberIds.has(m.id));
    if(state.avoidRepeatMember && validMembers.length>1){
      let lastMid = state.lastMemberId[team.id];
      validMembers = validMembers.filter(m=>m.id!==lastMid);
    }
    if(!validMembers.length){ showToast('No members left to pick in this team!'); return;}
    let i = Math.floor(Math.random()*validMembers.length);
    let target = validMembers[i];
    let rollMs = state.memberRollDuration*1000, steps=rollMs/50, idx=0;
    state.selectedMemberId = null;
    let spinInterval = setInterval(()=>{
      let fakeIdx = Math.floor(Math.random()*validMembers.length);
      let fakeName = validMembers[fakeIdx] ? validMembers[fakeIdx].name : "";
      renderRoulette(fakeName, 'member', (idx+1)/steps, true);
      idx++;
      if(idx>=steps){
        clearInterval(spinInterval);
        state.selectedMemberId = target.id;
        renderRoulette(target.name, 'member', 1, false);
        renderMembers();
        state.lastTeamId = state.selectedTeamId;
        state.lastMemberId[team.id] = target.id;
        state.usedTeamIds.add(team.id);
        appendHistory(team.name, target.name, target.id, team.id);
        confetti();
        renderTeams();
      }
    },50);
  }
}

function appendHistory(team, member, memberId=null, teamId=null){
  state.drawHistory.unshift({ time: nowStr(), team, member });
  if(state.drawHistory.length>state.maxHistory) state.drawHistory.pop();
  if(memberId) state.usedMemberIds.add(memberId);
  renderTeams();
  renderMembers();
  renderHistory();
}

function renderHistory(){
  let tb = document.querySelector('#historyTable tbody');
  tb.innerHTML = '';
  state.drawHistory.forEach((r,i)=>{
    let tr = document.createElement('tr');
    tr.className = 'cursor-pointer transition-colors';
    tr.innerHTML = `<td class="py-2 px-2 t-faint">${i+1}</td><td class="py-2 px-2 t-muted">${r.time}</td><td class="py-2 px-2 t-strong">${r.team}</td><td class="py-2 px-2 t-accent">${r.member}</td>`;
    tr.onclick = ()=>{
      let t = data.teams.find(t=>t.name===r.team);
      let m = t && t.members.find(mem=>mem.name===r.member);
      state.selectedTeamId = t ? t.id : null;
      state.selectedMemberId = m ? m.id : null;
      renderTeams(); renderMembers();
      renderRoulette(r.team, 'team');
      renderRoulette(r.member, 'member');
    };
    tb.appendChild(tr);
  });
}

function exportHistory(){
  if(!state.drawHistory.length){showToast('No history to export');return;}
  // Quotes only when needed and joins with CRLF, unlike KlassUtil.toCsv \u2014 kept
  // as-is so exported history files stay byte-for-byte what they always were.
  function esc(s){
    if(s==null) return '';
    s = String(s);
    if(/["\r\n,]/.test(s)) return `"${s.replace(/"/g,'""')}"`;
    return s;
  }
  let rows = ['No,Time,Team,Member'];
  state.drawHistory.slice().reverse().forEach((r,i)=>rows.push(`${i+1},${esc(r.time)},${esc(r.team)},${esc(r.member)}`));
  let csv = rows.join('\r\n');
  const name = 'draw-history-'+(new Date().toISOString().replace(/:/g, '').slice(0,17))+'.csv';
  KlassUtil.downloadCsv(name, csv);
}

function confetti(){
  let n = 22;
  let center = document.body;
  for(let i=0;i<n;++i){
    let e = document.createElement('div');
    let clr = ['#8b5cf6','#f97316','#ec4899','#10b981','#06b6d4'][i%5];
    let s = Math.random()*0.32+0.18;
    e.style.cssText = `position:fixed;pointer-events:none;z-index:2000;left:50vw;top:49vh;width:17px;height:17px;opacity:0.96;transform:scale(${s});transition:all 1.34s cubic-bezier(.61,0,.61,1);background:${clr};border-radius:50%`;
    setTimeout(()=>{
      e.style.left = (50+Math.floor(Math.random()*52-26))+'vw';
      e.style.top = (55+Math.random()*18)+'vh';
      e.style.opacity = 0;
      e.style.transform = `scale(${s*1.3}) rotate(${Math.random()*260}deg)`;
    },0);
    setTimeout(()=>center.removeChild(e),1300);
    center.appendChild(e);
  }
}
