<!DOCTYPE html>
<html lang="en" data-app="kseatingchart">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seating Chart – Klass</title>
    <meta name="theme-color" content="#4f46e5">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" href="icons/favicon-64.png">
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
    <link rel="stylesheet" href="assets/fonts/inter.css">
    <link rel="stylesheet" href="assets/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="assets/klass.css">
    <link rel="stylesheet" href="assets/accents.css">
    <script src="assets/tailwind.js"></script>
    <script src="assets/theme.js"></script>
    <script src="assets/klass-util.js"></script>
    <style>
        .k-seat {
            position: relative;
            border-radius: 0.75rem;
            padding: 1rem;
            text-align: center;
            font-weight: 500;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .k-seat-empty {
            background-color: var(--surface-2);
            border: 1px dashed var(--border-strong);
            color: var(--text-faint);
        }
        .k-seat-filled {
            background-color: var(--accent-soft);
            border: 2px solid var(--accent-border);
            color: var(--text);
        }
        .seat-number {
            position: absolute;
            top: 0.25rem;
            left: 0.5rem;
            font-size: 0.75rem;
            font-weight: 400;
            color: var(--text-faint);
        }
        .k-seat.animating {
            animation: seat-pulse 0.3s ease-in-out;
        }
        @keyframes seat-pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .progress-track {
            background-color: var(--surface-2);
            border: 1px solid var(--border);
        }
        .progress-bar-animated {
            background: linear-gradient(90deg, #4f46e5 0%, #818cf8 50%, #4f46e5 100%);
            background-size: 200% 100%;
            animation: progress-shimmer 1.5s ease-in-out infinite;
        }
        @keyframes progress-shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="font-sans min-h-screen flex flex-col">
    <nav class="k-nav">
        <div class="container mx-auto max-w-5xl px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <a href="index.html" class="flex items-center gap-3">
                    <img class="k-logo" src="icons/icon.svg" alt="">
                    <span class="text-lg font-bold">Klass</span>
                </a>
                <span class="k-badge">Seating Chart</span>
            </div>
            <button id="themeToggle" class="k-btn k-btn-secondary k-btn-icon" aria-label="Toggle dark mode" title="Toggle dark mode">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </nav>

    <header class="container mx-auto max-w-5xl px-6 pt-10 pb-8 text-center">
        <h1 class="text-3xl md:text-4xl font-bold mb-2">Seating Chart Generator</h1>
        <p class="k-status text-base max-w-xl mx-auto">Maximize distance between students with intelligent seat assignment.</p>
    </header>

    <main class="flex-1 container mx-auto max-w-5xl px-6 pb-16">
        <div class="space-y-6">
            <div class="grid gap-6 lg:grid-cols-2">
                <div class="k-card p-6">
                    <h2 class="k-card-title mb-4"><i class="fa-solid fa-sliders"></i>Configuration</h2>

                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label for="rows" class="k-label block mb-2">Rows</label>
                                <input type="number" id="rows" min="1" max="20" value="4" class="k-input w-full text-center">
                            </div>
                            <div>
                                <label for="cols" class="k-label block mb-2">Columns</label>
                                <input type="number" id="cols" min="1" max="20" value="5" class="k-input w-full text-center">
                            </div>
                        </div>
                        <div>
                            <label for="duration" class="k-label block mb-2">Animation Duration: <span id="durationDisplay" class="t-accent font-semibold">5s</span></label>
                            <input type="range" id="duration" min="3" max="10" value="5" class="k-range w-full cursor-pointer">
                        </div>
                        <label class="flex items-center gap-2 k-label cursor-pointer">
                            <input type="checkbox" id="showSeatNumbers" checked onchange="toggleSeatNumbers()" class="k-check">
                            Show seat numbers
                        </label>
                    </div>
                </div>

                <div class="k-card p-6">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="k-card-title"><i class="fa-solid fa-user-plus"></i>Student Names</h2>
                        <div class="k-badge"><i class="fa-solid fa-users"></i><span id="studentCount">0</span></div>
                    </div>
                    <textarea id="students" rows="5" placeholder="Enter student names, one per line..." class="k-input w-full resize-none font-mono"></textarea>

                    <div class="flex gap-3 mt-4">
                        <button id="generateBtn" onclick="generateSeatingChart()" class="k-btn k-btn-primary flex-1">
                            <i class="fa-solid fa-wand-magic-sparkles"></i>Generate
                        </button>
                        <button id="exportBtn" onclick="exportToCSV()" class="k-btn k-btn-secondary hidden">
                            <i class="fa-solid fa-download"></i>Export
                        </button>
                    </div>

                    <div id="progress" class="mt-4 hidden">
                        <div class="progress-track h-2 rounded-full overflow-hidden">
                            <div id="progressBar" class="h-full progress-bar-animated rounded-full" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="k-card p-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="k-card-title"><i class="fa-solid fa-chair"></i>Seating Chart</h2>
                    <div id="warning" class="hidden k-warning" role="alert"></div>
                </div>
                <div id="seatingChart" class="flex items-center justify-center min-h-[300px]">
                    <div class="text-center t-faint">
                        <i class="fa-solid fa-chair text-4xl mb-3 opacity-40"></i>
                        <p>Configure and generate a seating chart</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="k-footer">
        <div class="container mx-auto max-w-5xl px-6 py-6 text-center">
            <span>&copy; 2025 <a href="https://github.com/prasertcbs" target="_blank" rel="noopener" class="t-accent hover:underline">Prasert Kanawattanachai</a> &middot; <a href="index.html" class="t-accent hover:underline">All tools</a></span>
        </div>
    </footer>

    <script>
        let animationInterval;
        let isAnimating = false;

        document.getElementById('duration').addEventListener('input', function() {
            document.getElementById('durationDisplay').textContent = `${this.value}s`;
        });

        function parseStudents(textareaInput) {
            return textareaInput
                .split('\n')
                .map(line => line.trim())
                .filter(line => line.length > 0)
                .map(line => {
                    const parts = line.split(/\t|,|\||;|:| - /).map(p => p.trim()).filter(p => p.length > 0);
                    if (parts.length > 1) {
                        const id = parts[0];
                        const name = parts.slice(1).join(', ');
                        return { id, name };
                    }
                    return { id: null, name: line };
                });
        }

        function createGrid(rows, cols) {
            const seatingChart = document.getElementById('seatingChart');
            seatingChart.innerHTML = '';

            const grid = document.createElement('div');
            grid.className = 'grid gap-3 w-full';
            grid.style.gridTemplateColumns = `repeat(${cols}, minmax(0, 1fr))`;

            for (let i = 0; i < rows * cols; i++) {
                const seat = document.createElement('div');
                seat.className = 'seat k-seat k-seat-empty';
                seat.id = `seat-${i}`;

                const seatNumber = document.createElement('div');
                seatNumber.className = 'seat-number';
                seatNumber.textContent = `#${i + 1}`;
                seatNumber.style.display = document.getElementById('showSeatNumbers').checked ? 'block' : 'none';
                seat.appendChild(seatNumber);

                grid.appendChild(seat);
            }

            seatingChart.appendChild(grid);
            return grid;
        }

        function assignSeats(students, totalSeats) {
            const rows = parseInt(document.getElementById('rows').value);
            const cols = parseInt(document.getElementById('cols').value);

            const assignments = new Array(totalSeats).fill(null).map(() => ({ id: null, name: 'Empty' }));

            if (students.length === 0 || totalSeats === 0) {
                return assignments;
            }

            const studentCount = Math.min(students.length, totalSeats);
            const shuffledStudents = KlassUtil.shuffle(students);

            const oddSeats = [];
            const evenSeats = [];

            for (let i = 0; i < totalSeats; i++) {
                if (i % 2 === 0) {
                    evenSeats.push(i);
                } else {
                    oddSeats.push(i);
                }
            }

            let studentIndex = 0;

            for (let i = 0; i < oddSeats.length && studentIndex < studentCount; i++) {
                assignments[oddSeats[i]] = shuffledStudents[studentIndex];
                studentIndex++;
            }

            for (let i = 0; i < evenSeats.length && studentIndex < studentCount; i++) {
                assignments[evenSeats[i]] = shuffledStudents[studentIndex];
                studentIndex++;
            }

            return assignments;
        }

        function updateSeatingDisplay(assignments) {
            assignments.forEach((entry, index) => {
                const seat = document.getElementById(`seat-${index}`);
                if (seat) {
                    const seatNumber = seat.querySelector('.seat-number');
                    seat.innerHTML = '';

                    if (seatNumber) {
                        seat.appendChild(seatNumber);
                    }

                    const nameSpan = document.createElement('span');
                    nameSpan.textContent = entry.name;
                    nameSpan.className = 'text-sm truncate';
                    seat.appendChild(nameSpan);

                    seat.dataset.studentId = entry.id || '';

                    if (entry.name === 'Empty') {
                        seat.className = 'seat k-seat k-seat-empty';
                    } else {
                        seat.className = 'seat k-seat k-seat-filled';
                    }

                    if (isAnimating) {
                        seat.classList.add('animating');
                    }
                }
            });
        }

        function toggleSeatNumbers() {
            const showNumbers = document.getElementById('showSeatNumbers').checked;
            document.querySelectorAll('.seat-number').forEach(seatNumber => {
                seatNumber.style.display = showNumbers ? 'block' : 'none';
            });
        }

        function exportToCSV() {
            const seats = document.querySelectorAll('.seat');
            if (seats.length === 0) {
                showWarning('Please generate a seating chart first.');
                return;
            }

            const hasIds = Array.from(seats).some(seat => seat.dataset && seat.dataset.studentId && seat.dataset.studentId.trim() !== '');

            const csvData = [];
            if (hasIds) {
                csvData.push(['Seat Number', 'ID', 'Student Name']);
            } else {
                csvData.push(['Seat Number', 'Student Name']);
            }

            seats.forEach((seat, index) => {
                const seatNumber = index + 1;
                const studentNameSpan = seat.querySelector('span');
                const studentName = studentNameSpan ? studentNameSpan.textContent : '';
                const studentId = seat.dataset ? (seat.dataset.studentId || '') : '';

                if (studentName && studentName !== 'Empty') {
                    if (hasIds) {
                        csvData.push([seatNumber, studentId, studentName]);
                    } else {
                        csvData.push([seatNumber, studentName]);
                    }
                }
            });

            KlassUtil.downloadCsv('seating-chart.csv', KlassUtil.toCsv(csvData));
        }

        function animateShuffle(students, duration) {
            const totalSeats = students.totalSeats;
            const studentNames = students.names;
            let startTime = Date.now();
            let shuffledStudents = [...studentNames];

            const progress = document.getElementById('progress');
            const progressBar = document.getElementById('progressBar');
            progress.classList.remove('hidden');

            isAnimating = true;

            animationInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const progressPercent = Math.min((elapsed / (duration * 1000)) * 100, 100);
                progressBar.style.width = `${progressPercent}%`;

                if (elapsed >= duration * 1000) {
                    clearInterval(animationInterval);
                    isAnimating = false;
                    progress.classList.add('hidden');
                    progressBar.style.width = '0%';

                    const finalAssignments = assignSeats(shuffledStudents, totalSeats);
                    updateSeatingDisplay(finalAssignments);

                    document.getElementById('generateBtn').disabled = false;
                    document.getElementById('generateBtn').innerHTML = '<i class="fa-solid fa-wand-magic-sparkles"></i>Generate';
                    document.getElementById('exportBtn').classList.remove('hidden');
                    return;
                }

                shuffledStudents = KlassUtil.shuffle(studentNames);
                const assignments = assignSeats(shuffledStudents, totalSeats);
                updateSeatingDisplay(assignments);
            }, 300);
        }

        function showWarning(message) {
            const warning = document.getElementById('warning');
            warning.textContent = message;
            warning.classList.remove('hidden');
            setTimeout(() => {
                warning.classList.add('hidden');
            }, 5000);
        }

        function generateSeatingChart() {
            if (isAnimating) {
                clearInterval(animationInterval);
                isAnimating = false;
                document.getElementById('progress').classList.add('hidden');
            }

            const rows = parseInt(document.getElementById('rows').value);
            const cols = parseInt(document.getElementById('cols').value);
            const duration = parseInt(document.getElementById('duration').value);
            const studentsInput = document.getElementById('students').value;

            if (!rows || !cols || rows < 1 || cols < 1) {
                showWarning('Please enter valid numbers for rows and columns.');
                return;
            }

            if (duration < 3 || duration > 10) {
                showWarning('Animation duration must be between 3 and 10 seconds.');
                return;
            }

            const studentNames = parseStudents(studentsInput);
            const totalSeats = rows * cols;

            if (studentNames.length === 0) {
                showWarning('Please enter at least one student name.');
                return;
            }

            if (studentNames.length > totalSeats) {
                showWarning(`${studentNames.length} students but only ${totalSeats} seats.`);
                studentNames.splice(totalSeats);
            }

            document.getElementById('studentCount').textContent = studentNames.length;

            createGrid(rows, cols);

            document.getElementById('generateBtn').disabled = true;
            document.getElementById('generateBtn').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>Generating...';
            document.getElementById('exportBtn').classList.add('hidden');

            animateShuffle({
                names: studentNames,
                totalSeats: totalSeats
            }, duration);
        }

        window.addEventListener('load', function() {
            document.getElementById('students').value = `Alice Johnson
Bob Smith
Carol Davis
David Wilson
Emma Brown
Frank Miller
Grace Taylor
Henry Anderson
Ivy Thomas
Jack White
Kate Green
Liam Clark
Mia Hall
Noah Young
Olivia King
Paul Wright
Quinn Lee
Ruby Scott
Sam Turner
Tina Adams`;

            const initialStudents = parseStudents(document.getElementById('students').value);
            document.getElementById('studentCount').textContent = initialStudents.length;
        });
    </script>
    <script src="assets/app.js"></script>
</body>
</html>
